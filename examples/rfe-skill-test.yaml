---
# RFE pipeline: speedrun, review, submit, then create strategy
#
# Flow:
#   1. check_existing  — look for prior review artifact (skip speedrun if exists)
#   2. rfe_speedrun    — run rfe.speedrun skill (creates RFE task + review)
#   3. load_rfe_results    — load task and review artifacts from shared volume
#   4. rfe_submit      — submit RFE if review passed
#   5. strategy_create — create strategy doc if RFE was submitted

entrypoint: main

namespace: ai-pipeline

vars:
  issue: RHAIRFE-1981
  model: opus
  runner: sdk

step_types:
  agent_job:
    base: k8s_job
    description: "Run a pipeline-agent skill as a K8s Job"
    job:
      image: pipeline-agent:latest
      backoff_limit: 0
      ttl_seconds: 86400
      service_account: pipeline-dashboard
      init_containers:
        - name: update-ca-trust
          image: alpine:3.19
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -ex
              apk add --no-cache ca-certificates
              if [ -f /tmp/ca-cert/ca.crt ]; then
                mkdir -p /usr/local/share/ca-certificates
                cp /tmp/ca-cert/ca.crt /usr/local/share/ca-certificates/internal-ca.crt
                update-ca-certificates
                cp /etc/ssl/certs/ca-certificates.crt /shared/ca-certificates.crt
                echo "CA trust store updated successfully"
              else
                echo "No CA cert found, skipping"
                cp /etc/ssl/certs/ca-certificates.crt /shared/ca-certificates.crt || touch /shared/ca-certificates.crt
              fi
          volume_mounts:
            - name: ca-cert
              mount_path: /tmp/ca-cert
            - name: shared-ca
              mount_path: /shared
      env:
        GOOGLE_APPLICATION_CREDENTIALS: /home/pipelineagent/.config/gcloud/credentials.json
        MLFLOW_TRACKING_URI: http://mlflow.ai-pipeline.svc.cluster.local:5000
      secrets:
        - pipeline-secrets
      volumes:
        - name: pipeline-issues
          mount: /app/issues
          pvc: pipeline-issues
        - name: pipeline-workspace
          mount: /app/workspace
          pvc: pipeline-workspace
        - name: pipeline-logs
          mount: /app/logs
          pvc: pipeline-logs
        - name: pipeline-artifacts
          mount: /app/artifacts
          pvc: pipeline-artifacts
        - name: pipeline-context
          mount: /app/.context
          pvc: pipeline-context
        - name: gcp-credentials
          mount: /home/pipelineagent/.config/gcloud
          secret: gcp-credentials
          read_only: true
        - name: shared-ca
          mount: /shared
          type: emptyDir
          read_only: true
        - name: ca-cert
          type: configMap
          config_map: internal-ca-cert
      resources:
        requests:
          memory: 2Gi
          cpu: 500m
        limits:
          memory: 8Gi
          cpu: 2000m
      affinity:
        pod_affinity:
          required:
            match_labels:
              app: pipeline-dashboard
            topology_key: kubernetes.io/hostname

workflows:
  - name: main
    steps:
      # Check if artifacts already exist from a previous run
      - name: check_existing
        type: load_artifact
        artifacts:
          review:
            path: "/app/artifacts/rfe-reviews/{{ issue }}-review.md"
            format: markdown
            source: k8s
            optional: true

      # Only run the skill if no review artifact exists yet
      # jwforres/rfe-creator@main:rfe.speedrun
      - name: rfe_speedrun
        type: agent_job
        when: "check_existing.artifacts.review == None"
        params:
          command: ["/bin/bash"]
          args:
            - /app/scripts/run_skill.sh
            - --skill
            - rfe-speedrun
            - --issue
            - "{{ issue }}"
            - --model
            - "{{ model }}"

      # Load the full set of artifacts
      - name: load_rfe_results
        type: load_artifact
        artifacts:
          task:
            path: "/app/artifacts/rfe-tasks/{{ issue }}.md"
            format: markdown
            source: k8s
          review:
            path: "/app/artifacts/rfe-reviews/{{ issue }}-review.md"
            format: markdown
            source: k8s

      # Check if a strategy ticket already exists for this RFE
      - name: check_strat_exists
        type: load_artifact
        artifacts:
          tickets:
            path: "/app/artifacts/strat-tickets.md"
            format: markdown_table
            source: k8s
            optional: true

      # Compute reusable decision variables from artifact data
      - name: eval_conditions
        type: set_fact
        vars:
          review_passed: "load_rfe_results.artifacts.review.frontmatter.pass == true and load_rfe_results.artifacts.review.frontmatter.recommendation != 'reject'"
          already_submitted: "load_rfe_results.artifacts.task.frontmatter.status == 'Submitted'"
          strat_exists: "check_strat_exists.artifacts.tickets != None and (issue in check_strat_exists.artifacts.tickets.rfe_source)"

      # Submit the RFE if the review passed and not already submitted
      - name: rfe_submit
        type: agent_job
        when: "review_passed and not already_submitted"
        params:
          command: ["/bin/bash"]
          args:
            - /app/scripts/run_skill.sh
            - --skill
            - rfe-submit
            - --issue
            - "{{ issue }}"
            - --model
            - "{{ model }}"

      # Add the strat-creator label to the Jira ticket before strategy creation
      - name: add_strat_label
        type: agent_job
        when: "review_passed and not strat_exists"
        params:
          command: ["/bin/sh", "-c"]
          args:
            - |
              curl -sfk -X PUT \
                -H "Content-Type: application/json" \
                -u "$JIRA_USER:$JIRA_TOKEN" \
                "$JIRA_SERVER/rest/api/2/issue/{{ issue }}" \
                -d '{"update":{"labels":[{"add":"strat-creator-3.5"}]}}'

      # Create strategy document after RFE is submitted
      # ederign/strat-creator@main:strategy-create
      - name: strategy_create
        type: agent_job
        when: "review_passed and not strat_exists"
        params:
          command: ["/bin/bash"]
          args:
            - /app/scripts/run_skill.sh
            - --skill
            - strategy-create
            - --issue
            - "{{ issue }}"
            - --model
            - "{{ model }}"
