---
# Single agent job: run rfe.speedrun skill against RHAIRFE-1981
#
# This demonstrates how step_types capture the full K8s Job spec
# (image, volumes, secrets, init containers, affinity) so that
# individual steps only need to provide skill-specific parameters.

entrypoint: main

namespace: ai-pipeline

vars:
  issue: RHAIRFE-1981
  model: opus
  runner: sdk
  skill: rfe-speedrun          # key from pipeline-skills.yaml
  skill_source: "jwforres/rfe-creator@main:rfe.speedrun"  # display name for reference

step_types:
  agent_job:
    base: k8s_job
    description: "Run a pipeline-agent skill as a K8s Job"
    job:
      image: pipeline-agent:latest
      backoff_limit: 0
      ttl_seconds: 86400
      service_account: pipeline-dashboard
      init_containers:
        - name: update-ca-trust
          image: alpine:3.19
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -ex
              apk add --no-cache ca-certificates
              if [ -f /tmp/ca-cert/ca.crt ]; then
                mkdir -p /usr/local/share/ca-certificates
                cp /tmp/ca-cert/ca.crt /usr/local/share/ca-certificates/internal-ca.crt
                update-ca-certificates
                cp /etc/ssl/certs/ca-certificates.crt /shared/ca-certificates.crt
                echo "CA trust store updated successfully"
              else
                echo "No CA cert found, skipping"
                cp /etc/ssl/certs/ca-certificates.crt /shared/ca-certificates.crt || touch /shared/ca-certificates.crt
              fi
          volume_mounts:
            - name: ca-cert
              mount_path: /tmp/ca-cert
            - name: shared-ca
              mount_path: /shared
      env:
        GOOGLE_APPLICATION_CREDENTIALS: /home/pipelineagent/.config/gcloud/credentials.json
        MLFLOW_TRACKING_URI: http://mlflow.ai-pipeline.svc.cluster.local:5000
      secrets:
        - pipeline-secrets
      volumes:
        - name: pipeline-issues
          mount: /app/issues
          pvc: pipeline-issues
        - name: pipeline-workspace
          mount: /app/workspace
          pvc: pipeline-workspace
        - name: pipeline-logs
          mount: /app/logs
          pvc: pipeline-logs
        - name: pipeline-artifacts
          mount: /app/artifacts
          pvc: pipeline-artifacts
        - name: pipeline-context
          mount: /app/.context
          pvc: pipeline-context
        - name: gcp-credentials
          mount: /home/pipelineagent/.config/gcloud
          secret: gcp-credentials
          read_only: true
        - name: shared-ca
          mount: /shared
          type: emptyDir
          read_only: true
        - name: ca-cert
          type: configMap
          config_map: internal-ca-cert
      resources:
        requests:
          memory: 2Gi
          cpu: 500m
        limits:
          memory: 8Gi
          cpu: 2000m
      affinity:
        pod_affinity:
          required:
            match_labels:
              app: pipeline-dashboard
            topology_key: kubernetes.io/hostname

workflows:
  - name: main
    steps:
      - name: rfe_speedrun
        type: agent_job
        params:
          command: ["/bin/bash"]
          args:
            - /app/scripts/run_skill.sh
            - --skill
            - "{{ skill }}"
            - --issue
            - "{{ issue }}"
            - --model
            - "{{ model }}"

      # Load the artifacts the skill wrote to the shared volume
      - name: load_results
        type: load_artifact
        artifacts:
          task:
            path: "/app/artifacts/rfe-tasks/{{ issue }}.md"
            format: markdown
          review:
            path: "/app/artifacts/rfe-reviews/{{ issue }}-review.md"
            format: markdown

      # Gate: only continue if the review passed
      - name: quality_check
        type: shell_exec
        when: "load_results.artifacts.review.frontmatter.pass == true"
        params:
          command: >
            echo 'RFE {{ issue }} passed review
            (score: {{ load_results.artifacts.review.frontmatter.score }},
            recommendation: {{ load_results.artifacts.review.frontmatter.recommendation }})'

      # Skip if the recommendation is to reject
      - name: next_steps
        type: shell_exec
        when: "load_results.artifacts.review.frontmatter.recommendation != 'reject'"
        params:
          command: >
            echo 'RFE {{ issue }} approved for next phase
            (feasibility: {{ load_results.artifacts.review.frontmatter.feasibility }})'
