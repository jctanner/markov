---
# Test the fromjson filter
#
# Parses a JSON array from shell output and iterates over it.
#
# Run: markov run examples/fromjson-test.yaml --verbose

entrypoint: main

workflows:
  - name: main
    steps:
      - name: produce_json
        type: shell_exec
        params:
          command: "echo '[{\"key\":\"PROJ-100\",\"title\":\"Fix bug\"},{\"key\":\"PROJ-200\",\"title\":\"Add feature\"},{\"key\":\"PROJ-300\",\"title\":\"Update docs\"}]'"
        register: produce_json

      - name: parse_it
        type: set_fact
        vars:
          items: "{{ produce_json.stdout | fromjson }}"

      - name: show_count
        type: shell_exec
        params:
          command: "echo 'Parsed {{ items | length }} items from JSON'"

      - name: process_items
        for_each: items
        for_each_key: "key"
        for_each_sort: "key"
        as: item
        concurrency: 1
        workflow: handle_item
        vars:
          item_key: "{{ item.key }}"
          item_title: "{{ item.title }}"

  - name: handle_item
    steps:
      - name: log_item
        type: shell_exec
        params:
          command: "echo 'Item {{ item_key }}: {{ item_title }}'"
